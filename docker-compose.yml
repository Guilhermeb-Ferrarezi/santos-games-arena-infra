services:
  sga-auth-api:
    build:
      context: .
      dockerfile: apps/auth-api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sga_db
      REDIS_URL: redis://redis:6379
      AUTH_COOKIE_NAME: sg_auth
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-with-at-least-32-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-web:
    build:
      context: .
      dockerfile: apps/auth-web/Dockerfile
      args:
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-${AUTH_PUBLIC_URL:-http://localhost:3001}}
    ports:
      - "5173:80"
    depends_on:
      - sga-auth-api

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --url http://auth-web:80 --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - auth-web

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sga_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
